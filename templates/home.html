{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4 text-center">Welcome to StudentMS</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Student Section -->
            <div class="card shadow-sm mb-4">
                <div class="card-body text-center">
                    <h4>Student Portal</h4>
                    <p>Register or Login as Student</p>
                    <a href="{% url 'student_register' %}" class="btn btn-primary w-100 mb-2">
                        Student Register
                    </a>
                    <a href="{% url 'student_login' %}" class="btn btn-outline-primary w-100">
                        Student Login
                    </a>
                </div>
            </div>
            <!-- Admin Section -->
            <div class="card shadow-sm mb-3">
                <div class="card-body text-center">
                    <h4>Admin Portal</h4>
                    <p>Register or Login as Admin</p>
                    <a href="{% url 'admin_register' %}" class="btn btn-danger w-100 mb-2">
                        Admin Register
                    </a>
                    <a href="{% url 'admin_login' %}" class="btn btn-outline-danger w-100">
                        Admin Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
