{% extends 'base.html' %}
{% block content %}
<style>
    .form-control, .form-select {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        border-radius: 8px;
        padding: 0.625rem 1rem;
        transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
        background: var(--bg-card-hover);
        border-color: var(--accent-red);
        color: var(--text-primary);
        box-shadow: 0 0 0 0.2rem rgba(239, 68, 68, 0.25);
    }
    
    .form-label {
        color: var(--text-secondary);
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    
    .text-center a {
        color: var(--accent-red);
        text-decoration: none;
        transition: all 0.3s ease;
    }
    
    .text-center a:hover {
        color: var(--accent-red-hover);
        text-decoration: underline;
    }
    
    .text-danger {
        background: linear-gradient(135deg, var(--accent-red), var(--accent-red-hover));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .border-danger {
        border-color: var(--accent-red) !important;
    }
    
    .alert-warning {
        background: rgba(251, 191, 36, 0.1);
        color: #fbbf24;
        border: 1px solid #f59e0b;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4 text-center text-danger">Admin Registration</h2>
        <form method="post" class="card card-body shadow-sm border-danger">
            {% csrf_token %}
            <div class="alert alert-warning">
                Only trusted administrators should create admin accounts.
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-danger w-100">Create Admin Account</button>
        </form>
        <p class="text-center mt-3">
            Back to <a href="{% url 'admin_login' %}">Admin Login</a>
        </p>
    </div>
</div>
{% endblock %}
