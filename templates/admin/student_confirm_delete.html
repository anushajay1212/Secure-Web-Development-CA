{% extends 'base.html' %}
{% block content %}
<style>
    .btn-secondary {
        background: linear-gradient(135deg, #64748b, #475569);
        color: white;
        border: none;
    }
    
    .btn-secondary:hover {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(100, 116, 139, 0.4);
        color: white;
    }
    
    .alert-danger {
        background: rgba(239, 68, 68, 0.1);
        color: var(--text-primary);
        border-color: var(--accent-red);
    }
    
    .alert-danger strong {
        color: var(--accent-red-hover);
    }
</style>

<h2 class="mb-3">Delete Student</h2>
<div class="alert alert-danger">
    Are you sure you want to remove student <strong>{{ profile.full_name }}</strong>?<br>
    This will delete their user account and all related data.
</div>
<form method="post">
    {% csrf_token %}
    <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
</form>
{% endblock %}
