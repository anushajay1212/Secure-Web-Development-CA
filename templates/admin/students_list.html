{% extends 'base.html' %}
{% block content %}
<style>
    .btn-warning {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        border: none;
    }
    
    .btn-warning:hover {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        color: white;
    }
    
    .btn-secondary {
        background: linear-gradient(135deg, #64748b, #475569);
        color: white;
        border: none;
    }
    
    .btn-secondary:hover {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(100, 116, 139, 0.4);
        color: white;
    }
    
    .table-dark {
        background: var(--bg-secondary) !important;
        color: var(--text-primary) !important;
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Students</h2>
    <a href="{% url 'student_create' %}" class="btn btn-primary">+ Add Student</a>
</div>
<table class="table table-striped table-hover shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Username</th>
            <th>Email</th>
            <th style="width: 160px;">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for s in students %}
            <tr>
                <td>{{ s.student_id }}</td>
                <td>{{ s.full_name }}</td>
                <td>{{ s.user.username }}</td>
                <td>{{ s.user.email }}</td>
                <td>
                    <a href="{% url 'student_update' s.pk %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'student_delete' s.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'admin_dashboard' %}" class="btn btn-secondary mt-3">Back to Dashboard</a>
{% endblock %}
