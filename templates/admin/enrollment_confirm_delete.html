{% extends 'base.html' %}
{% block content %}
<style>
    .text-danger {
        background: linear-gradient(135deg, var(--accent-red), var(--accent-red-hover));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .btn-secondary {
        background: linear-gradient(135deg, #64748b, #475569);
        color: white;
        border: none;
    }
    
    .btn-secondary:hover {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(100, 116, 139, 0.4);
        color: white;
    }
    
    p, ul, li {
        color: var(--text-secondary);
    }
    
    li strong {
        color: var(--text-primary);
    }
</style>

<h2 class="mb-4 text-danger">Confirm Delete</h2>
<p>
    Are you sure you want to delete the enrollment:
</p>
<ul>
    <li><strong>Student:</strong> {{ enrollment.student.full_name }}</li>
    <li><strong>Course:</strong> {{ enrollment.course.code }} — {{ enrollment.course.name }}</li>
</ul>
<form method="post" class="mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'enrollment_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
